<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkyCare — Sign In</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root,[data-theme="light"]{--bg:#F0F4F8;--card:#FFF;--input-bg:#F1F5F9;--border:#E2E8F0;--text:#0F172A;--text-sec:#475569;--text-muted:#94A3B8;--accent:#2563EB;--gradient:linear-gradient(135deg,#2563EB,#6366F1);--shadow:0 8px 40px rgba(0,0,0,0.08)}
    [data-theme="dark"]{--bg:#0B1120;--card:#151D2E;--input-bg:#1E293B;--border:#1E293B;--text:#F1F5F9;--text-sec:#94A3B8;--text-muted:#64748B;--accent:#60A5FA;--gradient:linear-gradient(135deg,#3B82F6,#818CF8);--shadow:0 8px 40px rgba(0,0,0,0.4)}
    body{font-family:'Plus Jakarta Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);color:var(--text);padding:20px;transition:background .3s,color .3s}
    .login-container{width:400px;max-width:100%}
    .login-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:40px 32px;box-shadow:var(--shadow)}
    .login-logo{text-align:center;margin-bottom:28px}
    .login-logo img{width:56px;height:56px;margin-bottom:8px}
    .login-logo-text{font-size:28px;font-weight:800;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .login-logo-sub{font-size:11px;color:var(--text-muted);letter-spacing:1.5px;text-transform:uppercase;margin-top:4px}
    .theme-btn{position:fixed;top:16px;right:16px;width:38px;height:38px;border-radius:50%;background:var(--card);border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
    .theme-btn:hover{border-color:var(--accent)}
    .theme-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
    .form-group{margin-bottom:18px}
    .form-label{display:block;font-size:12px;font-weight:600;color:var(--text-sec);margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px}
    .form-input{width:100%;padding:12px 14px;background:var(--input-bg);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;transition:all .2s;outline:none;font-family:inherit}
    .form-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
    .form-input::placeholder{color:var(--text-muted)}
    .login-btn{width:100%;padding:13px;border:none;border-radius:10px;background:var(--gradient);color:#fff;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;font-family:inherit;box-shadow:0 4px 16px rgba(37,99,235,.25);margin-top:4px;display:flex;align-items:center;justify-content:center;gap:8px}
    .login-btn:hover{box-shadow:0 6px 24px rgba(37,99,235,.35);transform:translateY(-1px)}
    .login-btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
    .login-btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
    .login-error{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:8px;padding:10px 14px;margin-bottom:16px;font-size:13px;color:#ef4444;display:none;align-items:center;gap:8px}
    .login-error.show{display:flex;animation:shake .35s ease}
    .login-error svg{width:16px;height:16px;stroke:#ef4444;fill:none;stroke-width:2;flex-shrink:0}
    @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
    .login-footer{text-align:center;margin-top:24px;padding-top:16px;border-top:1px solid var(--border)}
    .login-footer p{font-size:11px;color:var(--text-muted)}
  </style>
</head>
<body>
  <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">
    <svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
  </button>

  <div class="login-container">
    <div class="login-card">
      <div class="login-logo">
        <img src="/img/logo.svg" alt="SkyCare Logo">
        <div class="login-logo-text">SkyCare</div>
        <p class="login-logo-sub">Hospital Management System</p>
      </div>

      <div class="login-error" id="loginError">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
        <span id="errorText">Invalid credentials</span>
      </div>

      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label class="form-label">Username</label>
          <input type="text" class="form-input" id="username" placeholder="Enter username" autocomplete="username" required autofocus>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-input" id="password" placeholder="Enter password" autocomplete="current-password" required>
        </div>
        <button type="submit" class="login-btn" id="loginBtn">
          <svg viewBox="0 0 24 24"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
          Sign In
        </button>
      </form>

      <div class="login-footer"><p>© 2026 SkyCare HMS — Secure Access</p></div>
    </div>
  </div>

  <script>
    if(localStorage.getItem('skycare_token'))window.location.href='/';
    const theme=localStorage.getItem('skycare_theme')||'light';
    document.documentElement.setAttribute('data-theme',theme);
    updateBtn(theme);
    function toggleTheme(){const c=document.documentElement.getAttribute('data-theme');const n=c==='dark'?'light':'dark';document.documentElement.setAttribute('data-theme',n);localStorage.setItem('skycare_theme',n);updateBtn(n);}
    function updateBtn(t){document.getElementById('themeBtn').innerHTML=t==='dark'?'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>':'<svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>';}
    async function handleLogin(e){
      e.preventDefault();const btn=document.getElementById('loginBtn');const errBox=document.getElementById('loginError');
      btn.disabled=true;btn.innerHTML='<div style="width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite"></div> Signing in...';
      errBox.classList.remove('show');
      try{const res=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:document.getElementById('username').value,password:document.getElementById('password').value})});
        const data=await res.json();if(!res.ok)throw new Error(data.error||'Login failed');
        localStorage.setItem('skycare_token',data.token);localStorage.setItem('skycare_user',JSON.stringify(data.user));window.location.href='/';
      }catch(err){document.getElementById('errorText').textContent=err.message;errBox.classList.add('show');btn.disabled=false;btn.innerHTML='<svg viewBox="0 0 24 24" style="width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg> Sign In';}
    }
  </script>
  <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
</body>
</html>
