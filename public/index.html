<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkyCare — Hospital Management System</title>
  <meta name="description" content="SkyCare - Modern Hospital Management System with role-based access control, patient management, billing, and more.">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <img src="/img/logo.svg" alt="SkyCare" class="logo-img">
        <h1 class="logo-text">SkyCare</h1>
      </div>
    </div>
    <nav class="sidebar-nav" id="sidebarNav">
      <a href="#dashboard" class="nav-item active" data-page="dashboard" data-tooltip="Dashboard">
        <span class="nav-icon" data-icon="dashboard"></span><span class="nav-text">Dashboard</span>
      </a>
      <div class="nav-section-title">Management</div>
      <a href="#departments" class="nav-item" data-page="departments" data-tooltip="Departments">
        <span class="nav-icon" data-icon="departments"></span><span class="nav-text">Departments</span>
      </a>
      <a href="#doctors" class="nav-item" data-page="doctors" data-tooltip="Doctors">
        <span class="nav-icon" data-icon="doctors"></span><span class="nav-text">Doctors</span>
      </a>
      <a href="#patients" class="nav-item" data-page="patients" data-tooltip="Patients">
        <span class="nav-icon" data-icon="patients"></span><span class="nav-text">Patients</span>
      </a>
      <a href="#rooms" class="nav-item" data-page="rooms" data-tooltip="Rooms">
        <span class="nav-icon" data-icon="rooms"></span><span class="nav-text">Rooms</span>
      </a>
      <div class="nav-section-title">Operations</div>
      <a href="#admissions" class="nav-item" data-page="admissions" data-tooltip="Admissions">
        <span class="nav-icon" data-icon="admissions"></span><span class="nav-text">Admissions</span>
      </a>
      <a href="#medical-records" class="nav-item" data-page="medical-records" data-tooltip="Medical Records">
        <span class="nav-icon" data-icon="medical-records"></span><span class="nav-text">Medical Records</span>
      </a>
      <a href="#appointments" class="nav-item" data-page="appointments" data-tooltip="Appointments">
        <span class="nav-icon" data-icon="appointments"></span><span class="nav-text">Appointments</span>
      </a>
      <a href="#billing" class="nav-item" data-page="billing" data-tooltip="Billing">
        <span class="nav-icon" data-icon="billing"></span><span class="nav-text">Billing</span>
      </a>
      <div class="nav-section-title">Resources</div>
      <a href="#staff" class="nav-item" data-page="staff" data-tooltip="Staff & Duties">
        <span class="nav-icon" data-icon="staff"></span><span class="nav-text">Staff & Duties</span>
      </a>
      <a href="#blood-bank" class="nav-item" data-page="blood-bank" data-tooltip="Blood Bank">
        <span class="nav-icon" data-icon="blood-bank"></span><span class="nav-text">Blood Bank</span>
      </a>
      <div class="nav-section-title nav-admin-only">Administration</div>
      <a href="#users" class="nav-item nav-admin-only" data-page="users" data-tooltip="User Management">
        <span class="nav-icon" data-icon="users"></span><span class="nav-text">User Management</span>
      </a>
      <a href="#audit-log" class="nav-item nav-admin-only" data-page="audit-log" data-tooltip="Activity Log">
        <span class="nav-icon" data-icon="audit-log"></span><span class="nav-text">Activity Log</span>
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-footer-text">© 2026 SkyCare HMS</div>
    </div>
  </aside>

  <main class="main-content" id="mainContent">
    <header class="top-bar" id="topBar">
      <div class="top-bar-left">
        <button class="menu-toggle" id="menuToggle" aria-label="Toggle sidebar">
          <span></span><span></span><span></span>
        </button>
        <h2 class="page-title" id="pageTitle">Dashboard</h2>
      </div>
      <div class="top-bar-right">
        <div class="current-time" id="currentTime"></div>
        <div class="global-search" id="globalSearchWrap">
          <input type="text" id="globalSearchInput" placeholder="Search people..." autocomplete="off" onkeyup="handleGlobalSearch(this.value)">
          <svg class="global-search-icon" viewBox="0 0 24 24" width="15" height="15" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <div class="global-search-results" id="globalSearchResults"></div>
        </div>
        <button class="btn btn-sm btn-icon" id="globalRefreshBtn" onclick="refreshCurrentData()" title="Refresh Data" aria-label="Refresh Data">
          <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
        </button>
        <button class="theme-toggle" id="themeToggle" title="Toggle theme" aria-label="Toggle theme"></button>
        <div class="user-profile" id="userProfile">
          <img src="/img/logo.svg" alt="" class="user-avatar-img" id="userAvatarImg" style="display:none">
          <span class="user-avatar-icon" id="userAvatarIcon"></span>
          <span class="user-name" id="userName">Admin</span>
          <span class="user-role-badge" id="userRoleBadge">Admin</span>
        </div>
        <button class="btn btn-sm btn-password" id="changePasswordBtn" title="Change Password"></button>
        <button class="btn btn-sm btn-logout" id="logoutBtn" onclick="Auth.logout()" title="Sign Out"></button>
      </div>
    </header>

    <div class="page-content" id="pageContent">
      <div class="loading-spinner" id="loadingSpinner">
        <div class="spinner"></div>
        <p>Loading...</p>
      </div>
    </div>
  </main>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h3 class="modal-title" id="modalTitle">Title</h3>
        <button class="modal-close" id="modalClose" aria-label="Close modal"></button>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-footer" id="modalFooter">
        <button class="btn btn-secondary" id="modalCancel">Cancel</button>
        <button class="btn btn-primary" id="modalSave">Save</button>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js"></script>
  <script src="/js/icons.js"></script>
  <!-- AI Sidebar Overlay -->
  <div id="aiSidebarOverlay" class="ai-sidebar-overlay" onclick="closeAiSidebar()"></div>
  <!-- AI Sidebar -->
  <div id="aiSidebar" class="ai-sidebar">
    <div class="ai-header">
      <h3>
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--accent)"><path d="M12 3l1.912 5.813a2 2 0 001.275 1.275L21 12l-5.813 1.912a2 2 0 00-1.275 1.275L12 21l-1.912-5.813a2 2 0 00-1.275-1.275L3 12l5.813-1.912a2 2 0 001.275-1.275L12 3z"/></svg>
        AI Assistant
      </h3>
      <button class="ai-close" onclick="closeAiSidebar()"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
    </div>
    <div id="aiChatArea" style="flex:1; overflow-y:auto; padding:16px; background:var(--bg-body); display:flex; flex-direction:column; gap:12px;">
      <!-- Chat messages will go here -->
    </div>
    <div style="padding:16px; background:var(--bg-card); border-top:1px solid var(--border); display:flex; gap:8px;">
      <input type="text" id="aiChatInput" class="form-control" placeholder="Ask about patients, rooms, bills..." style="flex:1; padding:10px 14px;" onkeypress="if(event.key==='Enter') sendAiQuery()">
      <button class="btn btn-primary" onclick="sendAiQuery()" id="aiSendBtn" style="padding:0 16px;">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
      </button>
    </div>
  </div>

  <script src="/js/utils.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/keepalive.js"></script>
  <script src="/js/pages1.js"></script>
  <script src="/js/pages2.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
